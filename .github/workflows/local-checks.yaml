---
name: checks
permissions:
  contents: read
  pull-requests: read

"on":
  pull_request:
    branches:
      - main

jobs:
  adrs-check-toc:
    uses: ./.github/workflows/adr-check-toc.yaml
  conventional-commit:
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/conventional-commit.yaml
  pre-commit:
    uses: ./.github/workflows/pre-commit.yaml
  prettier:
    uses: ./.github/workflows/prettier.yaml
