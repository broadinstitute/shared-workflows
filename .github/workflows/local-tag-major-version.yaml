---
name: major-version-tag-update
"on":
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  pull-requests: read

jobs:
  update-major-version-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
      - name: Update major version tag
        uses: somaz94/major-tag-action@v1
        with:
          github_token: ${{ secrets.PAT_TOKEN }}
          tag: ${{ github.ref_name }}
